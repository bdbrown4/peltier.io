# Accept thresholds for bench-runner (SPEC §3.1).
# This file is trust-layer: read-only to the agent (SPEC §10).

# CI lower bound of the speedup ratio must clear 1 + threshold.
threshold = 0.02

# Measured runs per side (SPEC minimum: 30). Interleaved ABAB.
runs_per_side = 30

# Warm-up runs per side, discarded.
warmup_runs = 3

# Bootstrap resamples for the ratio CI.
bootstrap_iters = 10000

# Confidence level for the ratio CI.
confidence = 0.95

# Fixed PRNG seed so calibration runs are reproducible.
bootstrap_seed = 1887343589

# Machine-specific CPU pinning applied identically to both bench sides.
# Calibration evidence for this machine shows pinning tightens the A/A
# CI ~5x (results/calibration/). Empty string disables.
pin_prefix = "taskset -c 2"

# Differential-fuzz iterations requested per gate run (SPEC §3.2).
# fuzz_iters = 10000
