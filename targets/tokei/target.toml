# tokei — source-code statistics tool (Rust)
# Selection vs SPEC §6: CPU-bound line/language analysis (83% user time,
# single-threaded mode); upstream test suite; scriptable deterministic
# workload; MIT OR Apache-2.0; active, no dedicated perf team.

[source]
repo = "https://github.com/XAMPPRocky/tokei.git"
commit = "fa44e5194060305576514d59b850353643afbfc8"   # v14.0.0
license = "MIT OR Apache-2.0"

[build]
baseline = "CARGO_TARGET_DIR={out} cargo build --release --manifest-path targets/tokei/workspace/Cargo.toml"
binary = "{out}/release/tokei"
sanitizer = "CARGO_TARGET_DIR={out} RUSTFLAGS='-Zsanitizer=address' cargo +nightly build --target x86_64-unknown-linux-gnu --manifest-path targets/tokei/workspace/Cargo.toml"
sanitizer_binary = "{out}/x86_64-unknown-linux-gnu/debug/tokei"

[bench]
# Single rayon thread: measurement first (SPEC conventions); the
# multi-thread mode is a playbook class-7 concern, not the baseline.
command = "RAYON_NUM_THREADS=1 {binary} --sort code corpora/tokei/input > /dev/null"
workload = "8 replicas of pinned progit + comrak/src trees, 221 MB, 4360 files, single rayon thread"

[gates]
tests = "cargo test --release --manifest-path targets/tokei/workspace/Cargo.toml"
golden = "RAYON_NUM_THREADS=1 {binary} --sort code corpora/tokei/input"

[corpus]
manifest = "corpora/tokei/MANIFEST.sha256"
root = "corpora/tokei/input/copy1"
golden_sha256 = "corpora/tokei/GOLDEN.sha256"
